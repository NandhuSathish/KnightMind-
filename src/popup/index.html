<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KnightMind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #2a2a4e;
    }

    header .logo { font-size: 24px; }
    header h1 { font-size: 15px; font-weight: 600; color: #a0c4ff; }
    header p  { font-size: 11px; color: #666688; margin-top: 1px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a4e;
    }

    .toggle-row label { font-weight: 600; }

    /* Toggle switch */
    .switch { position: relative; width: 38px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #333355; border-radius: 22px; cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #4a9eff; }
    input:checked + .slider::before { transform: translateX(16px); }

    .settings { padding: 12px 16px; }
    .setting-row { margin-bottom: 12px; }
    .setting-row label { display: block; color: #888899; font-size: 11px; margin-bottom: 5px; }

    input[type="range"] {
      width: 100%; accent-color: #4a9eff;
    }

    .range-value { float: right; color: #a0c4ff; font-size: 11px; }

    .rep-section {
      padding: 12px 16px 4px;
      border-top: 1px solid #2a2a4e;
    }
    .rep-section h2 {
      font-size: 11px; font-weight: 600; color: #888899;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;
    }
    .rep-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .rep-row label { color: #888899; font-size: 11px; flex-shrink: 0; }
    select {
      background: #252540; border: 1px solid #3a3a60; color: #e0e0e0;
      font-size: 11px; padding: 3px 6px; border-radius: 4px; cursor: pointer;
    }
    .rep-file-label {
      flex: 1; background: #252540; border: 1px solid #3a3a60; color: #888899;
      font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rep-file-label:hover { border-color: #4a9eff; color: #e0e0e0; }
    input[type="file"] { display: none; }
    .rep-actions { display: flex; gap: 6px; margin-bottom: 8px; }
    .btn {
      flex: 1; background: rgba(74,158,255,0.12); border: 1px solid rgba(74,158,255,0.3);
      color: #a0c4ff; font-size: 11px; padding: 5px 8px; border-radius: 4px;
      cursor: pointer; font-family: inherit; transition: background 0.12s;
    }
    .btn:hover { background: rgba(74,158,255,0.2); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-danger {
      background: rgba(255,80,80,0.10); border-color: rgba(255,80,80,0.25); color: #ff9090;
    }
    .btn-danger:hover { background: rgba(255,80,80,0.18); }
    .rep-status { font-size: 11px; min-height: 16px; margin-bottom: 4px; color: #888899; }
    .rep-status.ok  { color: #7bffb2; }
    .rep-status.err { color: #ff7b7b; }
    .rep-book-list { margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
    .rep-book-item {
      display: flex; align-items: center; gap: 6px;
      background: rgba(74,158,255,0.07); border: 1px solid rgba(74,158,255,0.2);
      border-radius: 5px; padding: 5px 8px;
    }
    .rep-book-icon { font-size: 14px; flex-shrink: 0; }
    .rep-book-info { flex: 1; min-width: 0; }
    .rep-book-name { display: block; font-size: 11px; color: #a0c4ff; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rep-book-meta { display: block; font-size: 10px; color: #555577; margin-top: 1px; }
    .rep-book-del {
      flex: 0 0 auto; padding: 2px 7px; font-size: 12px;
      background: rgba(255,80,80,0.10); border: 1px solid rgba(255,80,80,0.25);
      color: #ff9090; border-radius: 4px; cursor: pointer; font-family: inherit;
      transition: background 0.12s;
    }
    .rep-book-del:hover { background: rgba(255,80,80,0.25); }
    .rep-book-empty { font-size: 11px; color: #444466; font-style: italic;
      text-align: center; padding: 4px 0; }

    footer {
      padding: 10px 16px;
      border-top: 1px solid #2a2a4e;
      color: #444466;
      font-size: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">♞</span>
    <div>
      <h1>KnightMind</h1>
      <p>Offline chess coaching</p>
    </div>
  </header>

  <div class="toggle-row">
    <label for="enabledToggle">Enabled</label>
    <label class="switch">
      <input type="checkbox" id="enabledToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="settings">
    <div class="setting-row">
      <label for="hintDelay">
        Hint delay
        <span class="range-value" id="hintDelayVal">0s</span>
      </label>
      <input type="range" id="hintDelay" min="0" max="10000" step="500">
    </div>

    <div class="setting-row">
      <label for="depthRange">
        Engine depth
        <span class="range-value" id="depthVal">18</span>
      </label>
      <input type="range" id="depthRange" min="6" max="24" step="1">
    </div>

    <div class="setting-row">
      <label for="multiPvRange">
        Lines shown
        <span class="range-value" id="multiPvVal">2</span>
      </label>
      <input type="range" id="multiPvRange" min="1" max="3" step="1">
    </div>

    <div class="toggle-row" style="padding: 0; margin-bottom: 8px; border: none;">
      <label for="arrowsToggle" style="color: #888899; font-size: 11px;">Show arrows</label>
      <label class="switch">
        <input type="checkbox" id="arrowsToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <section class="rep-section">
    <h2>Repertoire</h2>

    <div class="rep-row">
      <label for="repColor">Play as</label>
      <select id="repColor">
        <option value="white">White</option>
        <option value="black">Black</option>
      </select>
    </div>

    <div class="rep-row">
      <label for="repFileInput">PGN file</label>
      <label class="rep-file-label" for="repFileInput" id="repFileLabel">Choose file…</label>
      <input type="file" id="repFileInput" accept=".pgn,.txt">
    </div>

    <div class="rep-actions">
      <button class="btn" id="repLoadBtn" disabled>Load</button>
    </div>

    <div class="rep-status" id="repStatus"></div>

    <div class="rep-book-list" id="repBookList"></div>
  </section>

  <footer>KnightMind · Fully offline · No data collected</footer>

  <script type="module" src="index.js"></script>
</body>
</html>
